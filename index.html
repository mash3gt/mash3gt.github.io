<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#d5d0cb url("images/freddie-MGFzzAAAWlw-unsplash.jpg") center/cover fixed;color:#2a2a2a;font-family:'Outfit','Noto Sans JP',sans-serif;font-weight:300;line-height:1.7;min-height:100vh;display:flex;flex-direction:column;}

  .nav{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:100;background:rgba(255,255,255,0.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.06);}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-text{font-family:'Outfit',sans-serif;font-weight:600;font-size:15px;letter-spacing:3px;color:#2a2a2a;}
  .logo-text span{color:rgba(0,0,0,0.35);}
  .nav-links{display:flex;align-items:center;gap:12px;}
  .nav-link{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,0,0,0.4);text-decoration:none;padding:4px 8px;border:1px solid rgba(0,0,0,0.08);border-radius:4px;transition:all 0.2s;}
  .nav-link:hover{color:#2a2a2a;border-color:rgba(0,0,0,0.25);}
  .nav-link.active{color:#2a2a2a;border-color:rgba(0,0,0,0.2);}

  .gallery{flex:1;max-width:880px;width:100%;margin:0 auto;padding:80px 48px 60px;}

  .gallery-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:600;color:#2a2a2a;letter-spacing:2px;margin-bottom:40px;}

  .works{display:grid;grid-template-columns:1fr 1fr;gap:28px;}

  .work-card{text-decoration:none;color:inherit;display:block;background:rgba(255,255,255,0.92);border-radius:2px;box-shadow:0 2px 16px rgba(0,0,0,0.08);overflow:hidden;transition:transform 0.2s, box-shadow 0.2s;}
  .work-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,0.15);}

  .work-thumb{width:100%;aspect-ratio:4/3;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .work-thumb img{width:100%;height:100%;object-fit:cover;}
  .work-thumb .placeholder{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;}

  .work-info{padding:16px 20px;}
  .work-title{font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:#2a2a2a;letter-spacing:1px;margin-bottom:4px;}
  .work-technique{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1px;color:rgba(0,0,0,0.3);}

  .footer{max-width:880px;width:100%;margin:0 auto;padding:20px 48px;text-align:center;font-size:9px;color:rgba(0,0,0,0.25);letter-spacing:1px;}
  .footer a{color:rgba(0,0,0,0.4);text-decoration:none;}
  .footer a:hover{text-decoration:underline;}

  @media(max-width:600px){
    .nav{padding:0 12px;height:44px;}
    .nav-link{font-size:7px;padding:3px 5px;letter-spacing:1px;}
    .gallery{padding:64px 20px 40px;}
    .gallery-title{font-size:18px;margin-bottom:28px;}
    .works{grid-template-columns:1fr;gap:20px;}
    .work-info{padding:12px 16px;}
    .footer{padding:16px 24px;}
  }
</style>
</head>
<body>

<div class="nav">
  <a href="index.html" class="logo">
    <div class="logo-text">MASH3<span>GT</span></div>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link active">Gallery</a>
    <a href="concept.html" class="nav-link">Concept</a>
    <a href="about.html" class="nav-link">About</a>
  </div>
</div>

<div class="gallery">
  <h1 class="gallery-title">GALLERY</h1>

  <div class="works">
    <a href="001.html" class="work-card">
      <div class="work-thumb">
        <img src="images/001 — Flow around a Guitar.png" alt="001 — Flow around a Guitar">
      </div>
      <div class="work-info">
        <div class="work-title">001 — Flow around a Guitar</div>
        <div class="work-technique">Lattice Boltzmann Method / JavaScript + Canvas</div>
      </div>

    <a href="002.html" class="work-card">
      <div class="work-thumb">

  </div>
</div>
